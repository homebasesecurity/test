<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hello World — Website Under Construction</title>
  <style>
    :root{--bg:#0b1220;--card:#0f1724;--accent:#60a5fa;--text:#e6eef8}
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
    body{
      display:flex;align-items:center;justify-content:center;
      background:linear-gradient(180deg,var(--bg),#071025);
      color:var(--text);padding:2rem;
    }
    .card{
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border:1px solid rgba(255,255,255,0.04);
      padding:2rem;border-radius:12px;max-width:720px;text-align:center;
      box-shadow:0 8px 30px rgba(2,6,23,0.6);
    }
    h1{margin:0 0 .5rem;font-size:2.25rem;color:var(--accent)}
    p{margin:.25rem 0;color:rgba(230,238,248,0.9)}
    .small{margin-top:1rem;color:#9fbfe8;font-size:.95rem}
  </style>
</head>
<body>
  <main class="card" role="main">
    <h1>Hello World</h1>
    <p>Website Under Construction</p>
    <p class="small">Thanks for visiting — check back soon for updates.</p>
  </main>
</body>
</html>
